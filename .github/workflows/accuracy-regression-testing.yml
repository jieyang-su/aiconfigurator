name: "Accuracy Regression Testing"

on:
  pull_request:
    types:
      - opened
      - synchronize
  workflow_dispatch:
    inputs:
      old-ref:
        description: "Old revision to compare against"
        required: false
        default: "main"
        type: string

jobs:
  accuracy-regression-testing:
    name: AIC Accuracy Regression Testing
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - name: Checkout incoming revision
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Git LFS Pull
        run: git lfs pull

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Resolve old revision
        id: old-ref
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            OLD_REF="${{ github.event.pull_request.base.sha }}"
          else
            OLD_REF="${{ inputs.old-ref }}"
          fi
          echo "old_ref=${OLD_REF}" >> "$GITHUB_OUTPUT"
          echo "Comparing old revision ${OLD_REF} against incoming revision $(git rev-parse HEAD)"

      - name: Create old revision worktree
        run: |
          git worktree add --detach ../aiconfigurator-old "${{ steps.old-ref.outputs.old_ref }}"

      - name: Generate new predictions
        run: |
          mkdir -p tools/accuracy_regression_testing/results
          PYTHONPATH=src python tools/accuracy_regression_testing/predict_silicon_sample.py \
            --aic-output-prefix new \
            > tools/accuracy_regression_testing/results/silicon_result_new.csv \
            2> tools/accuracy_regression_testing/results/new_predictions.log

      - name: Generate old predictions
        run: |
          PYTHONPATH="${{ github.workspace }}/../aiconfigurator-old/src" \
            python tools/accuracy_regression_testing/predict_silicon_sample.py \
              tools/accuracy_regression_testing/results/silicon_result_new.csv \
              --aic-output-prefix old \
              > tools/accuracy_regression_testing/results/silicon_result.csv \
              2> tools/accuracy_regression_testing/results/old_predictions.log

      - name: Compare predictions
        run: |
          python tools/accuracy_regression_testing/compare_silicon_predictions.py \
            tools/accuracy_regression_testing/results/silicon_result.csv \
            --output tools/accuracy_regression_testing/results/comparison_summary.csv \
            --plot-output tools/accuracy_regression_testing/results/comparison_plot.png

      - name: Run regression gate
        run: |
          python -m pytest tools/accuracy_regression_testing/test_regression_thresholds.py -q

      - name: Upload regression artifacts
        id: upload-regression-artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accuracy-regression-testing-results
          path: |
            tools/accuracy_regression_testing/results/silicon_result_new.csv
            tools/accuracy_regression_testing/results/silicon_result.csv
            tools/accuracy_regression_testing/results/comparison_summary.csv
            tools/accuracy_regression_testing/results/comparison_plot.png
            tools/accuracy_regression_testing/results/new_predictions.log
            tools/accuracy_regression_testing/results/old_predictions.log
          if-no-files-found: ignore

      - name: Add summary
        if: always()
        run: |
          echo "## AIC Accuracy Regression Testing" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Old revision: \`${{ steps.old-ref.outputs.old_ref }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Incoming revision: \`$(git rev-parse HEAD)\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f tools/accuracy_regression_testing/results/comparison_summary.csv ]; then
            echo "### Comparison Summary" >> "$GITHUB_STEP_SUMMARY"
            echo '```csv' >> "$GITHUB_STEP_SUMMARY"
            cat tools/accuracy_regression_testing/results/comparison_summary.csv >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Comparison summary was not generated." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Prepare PR comment inputs
        if: always() && github.event_name == 'pull_request'
        env:
          ARTIFACT_URL: ${{ steps.upload-regression-artifacts.outputs.artifact-url }}
          OLD_REF: ${{ steps.old-ref.outputs.old_ref }}
        run: |
          set -euo pipefail
          rm -rf accuracy-regression-comment-inputs
          mkdir -p accuracy-regression-comment-inputs
          printf '%s\n' "${OLD_REF}" > accuracy-regression-comment-inputs/old-ref.txt
          printf '%s\n' "${ARTIFACT_URL}" > accuracy-regression-comment-inputs/artifact-url.txt
          cp tools/accuracy_regression_testing/results/comparison_summary.csv accuracy-regression-comment-inputs/ 2>/dev/null || true
          cp tools/accuracy_regression_testing/results/comparison_plot.png accuracy-regression-comment-inputs/ 2>/dev/null || true

      - name: Upload PR comment inputs
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: accuracy-regression-comment-inputs
          path: accuracy-regression-comment-inputs/**
          retention-days: 30
