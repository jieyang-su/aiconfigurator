# Keep GPU/DB assumptions same as rtx_pro_6000_server.
# Fabric assumption note: effective inter-node throughput can be modeled at ~70% of link peak
# during post analysis if oversubscription/congestion is expected.

data_dir: data/rtx_pro_6000_server

