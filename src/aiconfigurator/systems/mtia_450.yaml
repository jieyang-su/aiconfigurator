# MTIA 450 theoretical system spec.
# Reuse GB300 empirical curves for rack-scale EMPIRICAL/HYBRID estimation.

data_dir: data/b200_sxm # relative to systems_dir
gpu:
  mem_bw: 18400000000000 # 18.4TB/s
  mem_bw_empirical_scaling_factor: 0.8
  mem_empirical_constant_latency: 0.000003 # 3us
  mem_capacity: 288000000000 # 288GB
  float16_tc_flops: 3500000000000000 # 3.5PFLOPS BF16
  int8_tc_flops: 7000000000000000 # 7PFLOPS FP8/MX8 proxy
  fp8_tc_flops: 7000000000000000 # 7PFLOPS FP8/MX8
  fp4_tc_flops: 21000000000000000 # 21PFLOPS MX4
  power: 1400 # Watt
  sm_version: 100

node:
  num_gpus_per_node: 72 # scale-up domain size
  inter_node_bw: 100000000000 # 100GB/s, single direction
  intra_node_bw: 1200000000000 # 1.2TB/s, single direction
  pcie_bw: 64000000000 # 64GB/s, single direction
  p2p_latency: 0.00001 # 10us

misc:
  nccl_mem:
    1: 0
    2: 358612992 # 342MB
    4: 411041792 # 392MB
    8: 411041792 # 392MB
  other_mem: 3758096384
  nccl_version: '2.27'