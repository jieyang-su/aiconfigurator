# MTIA 300 theoretical system spec.
# Reuse H200 SXM empirical curves as the closest existing backend data template.

data_dir: data/b200_sxm # relative to systems_dir
gpu:
  mem_bw: 6100000000000 # 6.1TB/s
  mem_bw_empirical_scaling_factor: 0.8
  mem_empirical_constant_latency: 0.000003 # 3us
  mem_capacity: 216000000000 # 216GB
  bfloat16_tc_flops: 600000000000000 # 0.6PFLOPS BF16
  int8_tc_flops: 1200000000000000 # 1.2PFLOPS FP8/MX8 proxy
  fp8_tc_flops: 1200000000000000 # 1.2PFLOPS FP8/MX8
  power: 800 # Watt
  sm_version: 90

node:
  num_gpus_per_node: 16 # scale-up domain size
  inter_node_bw: 200000000000 # 200GB/s, single direction
  intra_node_bw: 1000000000000 # 1TB/s, single direction
  pcie_bw: 64000000000 # 64GB/s, single direction
  p2p_latency: 0.00001 # 10us

misc:
  nccl_mem:
    1: 0
    2: 358612992 # 342MB
    4: 411041792 # 392MB
    8: 411041792 # 392MB
  other_mem: 3758096384
  nccl_version: '2.26.2'